name: deploy-pages
on:
  push: { branches: [main] }
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
        working-directory: web
      - run: npm test   # includes the Python-engine parity suite
        working-directory: web
      - run: VITE_DEMO=1 VITE_BASE=/Meridian/ npm run build
        working-directory: web
      # Publish dist to the gh-pages branch; GitHub serves it as the Pages site.
      - name: Deploy to gh-pages branch
        working-directory: web/dist
        run: |
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
