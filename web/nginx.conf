# Serves the built SPA and reverse-proxies /api/* to the api service, mirroring
# the vite dev-server proxy (prefix stripped by the trailing slash on proxy_pass).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri /index.html;
    }
}
