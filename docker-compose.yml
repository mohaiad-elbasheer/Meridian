services:
  db:
    image: timescale/timescaledb:2.20.3-pg16   # pinned; multi-arch, works on OCI Ampere (arm64)
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meridian}
      POSTGRES_DB: meridian
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://meridian:${POSTGRES_PASSWORD:-meridian}@db:5432/meridian
    depends_on: [db]
    ports: ["8000:8000"]

  ingestion:
    build: ./ingestion
    env_file: .env      # API keys + pinned source URLs
    environment:
      # in-network DSN must win over any localhost DATABASE_URL in .env (REL-05)
      DATABASE_URL: postgresql://meridian:${POSTGRES_PASSWORD:-meridian}@db:5432/meridian
    depends_on:
      db:
        condition: service_healthy
    profiles: ["ingest"]

  web:
    build: ./web
    depends_on: [api]
    ports: ["5173:80"]
    profiles: ["web"]

volumes:
  dbdata:
